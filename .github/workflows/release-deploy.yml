name: Tagged Deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to create for this release (optional). If blank, uses release-<timestamp>-<sha>.
        required: false
      run_deploy:
        description: Trigger production deploy after tagging.
        required: false
        default: "true"

permissions:
  contents: write
  actions: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            COMMIT_SHA="${GITHUB_SHA::7}"
            TS="$(date +%Y%m%d-%H%M%S)"
            TAG="release-${TS}-${COMMIT_SHA}"
          fi

          if ! [[ "$TAG" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "Invalid tag format: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          if git show-ref --verify --quiet "refs/tags/$TAG"; then
            echo "Tag already exists: $TAG"
            exit 1
          fi

          git tag -a "$TAG" -m "Release $TAG from ${GITHUB_SHA}"
          git push origin "$TAG"

      - name: Trigger deploy workflow
        if: ${{ inputs.run_deploy != 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "Triggering deploy workflow from tagged ref: $TAG"
          gh workflow run deploy.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG"

      - name: Output release tag
        run: |
          echo "Tagged release: ${{ steps.tag.outputs.tag }}"
          echo "Commit: ${GITHUB_SHA}"
