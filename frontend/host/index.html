<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joystick Jammers — Host</title>
    <meta name="description" content="Joystick Jammers turns phones into controllers for a big-screen party game. Race with weapon pickups or wreck rivals in demolition derby. No installs — just a browser.">
    <meta name="theme-color" content="#16213e">
    <meta name="color-scheme" content="dark">
    <link rel="canonical" href="https://jammers.dilger.dev/">
    <link rel="stylesheet" href="/static/css/host.css">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">

    <!-- Open Graph -->
    <meta property="og:title" content="Joystick Jammers — Phone-Controller Party Racer &amp; Demolition Derby">
    <meta property="og:description" content="Phones become controllers, the action plays on the big screen. Race with weapons or wreck rivals in derby. Up to 16+ players, no installs.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jammers.dilger.dev/">
    <meta property="og:image" content="https://jammers.dilger.dev/static/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="Joystick Jammers">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Joystick Jammers — Phone-Controller Party Racer &amp; Demolition Derby">
    <meta name="twitter:description" content="Phones become controllers, the action plays on the big screen. Race with weapons or wreck rivals in derby. No installs — just a browser.">
    <meta name="twitter:image" content="https://jammers.dilger.dev/static/og-image.png">
    <style>
        /* Container for 3D game */
        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 50% 42%, rgba(254, 217, 93, 0.13), transparent 28rem),
                linear-gradient(135deg, #14161f 0%, #1f2430 54%, #12131a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #fff8df;
            padding: 24px;
            text-align: center;
            font-family: var(--font-body, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
            overflow: hidden;
        }
        .loading-overlay.hidden {
            display: none;
        }
        .loading-panel {
            position: relative;
            width: min(520px, 92vw);
            padding: 24px;
            border-radius: 8px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
                rgba(21, 24, 34, 0.96);
            border: 2px solid rgba(255, 248, 223, 0.18);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.14);
            backdrop-filter: none;
        }
        .loading-panel::before {
            content: "REC";
            position: absolute;
            top: 14px;
            right: 16px;
            color: #ff5a52;
            font-family: var(--font-mono, monospace);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.08em;
        }
        .loading-rig {
            display: grid;
            grid-template-columns: 1fr 72px 1fr;
            align-items: end;
            gap: 10px;
            width: min(320px, 72vw);
            min-height: 88px;
            margin: 4px auto 18px;
            color: #fff8df;
        }
        .loading-car {
            position: relative;
            height: 34px;
            border: 2px solid rgba(255, 248, 223, 0.82);
            border-radius: 8px 14px 6px 6px;
            background: linear-gradient(135deg, #f15b42, #fed95d 68%, #fff8df);
            box-shadow: 0 12px 0 -8px rgba(0, 0, 0, 0.55);
            animation: loading-car-nudge 1.4s steps(2, end) infinite;
        }
        .loading-car::before,
        .loading-car::after {
            content: "";
            position: absolute;
            bottom: -9px;
            width: 16px;
            height: 16px;
            border: 3px solid #151822;
            border-radius: 50%;
            background: #fff8df;
            box-shadow: inset 0 0 0 3px #273142;
        }
        .loading-car::before {
            left: 12px;
        }
        .loading-car::after {
            right: 12px;
        }
        .loading-car.part {
            opacity: 0.72;
            transform: translateY(9px) rotate(-2deg);
            animation-delay: -0.35s;
        }
        .loading-camera {
            position: relative;
            align-self: center;
            height: 48px;
            border: 2px solid rgba(255, 248, 223, 0.82);
            border-radius: 7px;
            background: #242936;
            box-shadow: inset 0 -10px 0 rgba(0, 0, 0, 0.18);
        }
        .loading-camera::before {
            content: "";
            position: absolute;
            left: 16px;
            top: 10px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: radial-gradient(circle, #7ee6ff 0 28%, #111722 30% 100%);
            border: 2px solid #fff8df;
        }
        .loading-camera::after {
            content: "";
            position: absolute;
            right: -13px;
            top: 14px;
            width: 14px;
            height: 20px;
            background: #fed95d;
            clip-path: polygon(0 15%, 100% 0, 100% 100%, 0 85%);
        }
        .loading-track {
            grid-column: 1 / -1;
            height: 3px;
            border-radius: 999px;
            background: repeating-linear-gradient(90deg, rgba(255, 248, 223, 0.75) 0 18px, transparent 18px 30px);
            animation: loading-track-roll 0.8s linear infinite;
        }
        .loading-title {
            margin-top: 0;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fed95d;
        }
        .loading-text {
            margin-top: 14px;
            font-size: 20px;
            font-weight: 800;
            color: #fff8df;
        }
        .loading-step {
            margin-top: 10px;
            font-size: 14px;
            color: rgba(255, 248, 223, 0.68);
        }
        .loading-pips {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }
        .loading-pips span {
            width: 34px;
            height: 7px;
            border-radius: 999px;
            background: rgba(255, 248, 223, 0.18);
        }
        .loading-overlay[data-loading-step="1"] .loading-pips span:nth-child(-n + 1),
        .loading-overlay[data-loading-step="2"] .loading-pips span:nth-child(-n + 2),
        .loading-overlay[data-loading-step="3"] .loading-pips span:nth-child(-n + 3),
        .loading-overlay[data-loading-step="4"] .loading-pips span:nth-child(-n + 4),
        .loading-overlay[data-loading-step="5"] .loading-pips span:nth-child(-n + 5) {
            background: #fed95d;
            box-shadow: 2px 2px 0 rgba(20, 17, 15, 0.45);
        }
        .loading-actions {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .loading-action,
        .error-retry {
            padding: 12px 22px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }
        .loading-action:focus-visible,
        .error-retry:focus-visible {
            outline: 2px solid #ffffff;
            outline-offset: 3px;
        }
        .loading-action:hover,
        .error-retry:hover {
            transform: translateY(-1px);
        }
        .loading-action.secondary {
            background: transparent;
            color: #fff8df;
            border: 1px solid rgba(255, 248, 223, 0.28);
            box-shadow: inset 0 2px 2px 0 rgba(255, 255, 255, 0.04);
        }
        @keyframes loading-car-nudge {
            50% { transform: translateY(-2px) rotate(1deg); }
        }
        @keyframes loading-track-roll {
            to { background-position-x: 30px; }
        }
        @media (prefers-reduced-motion: reduce) {
            .loading-car,
            .loading-track {
                animation: none;
            }
        }

        /* Error display */
        .error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            color: white;
            padding: 40px;
            text-align: center;
        }
        .error-overlay.hidden {
            display: none;
        }
        .error-title {
            color: #ff4444;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .error-message {
            color: #888;
            max-width: 500px;
        }
        .error-retry {
            margin-top: 20px;
            background: #00ff88;
            color: #1a1a2e;
            border: none;
        }

        /* Debug info */
        .debug-info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff88;
            padding: 10px;
            font-family: var(--font-mono, monospace);
            font-size: 12px;
            z-index: 100;
            border-radius: 5px;
        }
        .debug-info.hidden {
            display: none;
        }

        /* Debug panels (F2/F3 toggles) */
        .debug-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: var(--font-mono, monospace);
            font-size: 12px;
            z-index: 200;
            min-width: 200px;
        }
        .debug-panel.hidden {
            display: none;
        }
        .debug-panel-header {
            font-weight: bold;
            margin-bottom: 10px;
            color: #00ff88;
        }
        #stats-overlay {
            top: 10px;
            right: 10px;
        }
        #physics-params-panel {
            top: 10px;
            right: 230px;
        }

        /* Fullscreen toggle */
        #fullscreen-toggle {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 500;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        #fullscreen-toggle:hover {
            opacity: 1;
        }

        .camera-controls {
            position: fixed;
            left: 50%;
            bottom: 12px;
            transform: translateX(-50%);
            z-index: 520;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px;
            background: rgba(0, 0, 0, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 8px;
            color: white;
            font-family: var(--font-body, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
            backdrop-filter: none;
        }
        .camera-controls.hidden {
            display: none;
        }
        .camera-controls button {
            min-width: 44px;
            min-height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .camera-controls button.active,
        .camera-controls button:hover {
            background: #00ff88;
            border-color: #00ff88;
            color: #102018;
        }
        .camera-focus {
            min-width: 92px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body tabindex="-1">
    <!-- Game container (game-screen ID for test compatibility) -->
    <div id="game-container"></div>
    <div id="game-screen" class="hidden"></div>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay hidden" aria-live="polite" data-loading-step="1">
        <div class="loading-panel">
            <div class="loading-rig" aria-hidden="true">
                <div class="loading-car part"></div>
                <div class="loading-camera"></div>
                <div class="loading-car"></div>
                <div class="loading-track"></div>
            </div>
            <div class="loading-title">Camcorder warming</div>
            <div class="loading-text" id="loading-text" role="status">Bolting the wheels on...</div>
            <div class="loading-step" id="loading-step">Step 1 of 5</div>
            <div class="loading-pips" aria-hidden="true">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="loading-actions">
                <button id="loading-skip-btn" class="loading-action secondary" type="button">Skip warm-up</button>
            </div>
        </div>
    </div>

    <!-- Error overlay -->
    <div id="error-overlay" class="error-overlay hidden">
        <div class="error-title" id="error-title">Something went wrong</div>
        <div class="error-message" id="error-message"></div>
        <button id="error-retry-btn" class="error-retry" type="button" onclick="location.reload()">Retry</button>
    </div>

    <!-- Debug info (press D to toggle) -->
    <div id="debug-info" class="debug-info hidden">
        <div>FPS: <span id="debug-fps">0</span></div>
        <div>State: <span id="debug-state">-</span></div>
        <div>Players: <span id="debug-players">0</span></div>
        <div>Room: <span id="debug-room">-</span></div>
    </div>

    <!-- Debug UI panels are created dynamically by StatsOverlayUI and PhysicsTuningUI -->

    <div id="camera-controls" class="camera-controls hidden" aria-label="Camera view">
        <button type="button" data-camera-mode="party" aria-pressed="true">Party</button>
        <button type="button" data-camera-mode="chase" aria-pressed="false">Chase</button>
        <button type="button" data-camera-mode="hood" aria-pressed="false">Hood</button>
        <button type="button" id="camera-focus-prev" aria-label="Previous car">‹</button>
        <div id="camera-focus-label" class="camera-focus">0 cars</div>
        <button type="button" id="camera-focus-next" aria-label="Next car">›</button>
    </div>

    <!-- Fullscreen toggle -->
    <button id="fullscreen-toggle">⛶ Fullscreen</button>
    <script>
        (function() {
            const btn = document.getElementById('fullscreen-toggle');
            const root = document.documentElement;
            if (!root.requestFullscreen && !root.webkitRequestFullscreen) {
                btn.style.display = 'none';
                return;
            }
            const isActive = () => !!(document.fullscreenElement || document.webkitFullscreenElement);
            const updateLabel = () => {
                btn.textContent = isActive() ? '✕ Exit Fullscreen' : '⛶ Fullscreen';
            };
            btn.addEventListener('click', () => {
                if (isActive()) {
                    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                } else {
                    (root.requestFullscreen || root.webkitRequestFullscreen).call(root);
                }
            });
            document.addEventListener('fullscreenchange', updateLabel);
            document.addEventListener('webkitfullscreenchange', updateLabel);
        })();
    </script>

    <!-- Debug panel keyboard handlers (must be non-module for immediate registration) -->
    <script>
        // Expose toggle functions globally for testing
        window.togglePhysicsPanel = function() {
            const panel = document.getElementById('physics-params-panel');
            if (panel) {
                // host.css uses .visible class, not .hidden
                panel.classList.toggle('visible');
            }
        };
        window.toggleStatsOverlay = function() {
            const panel = document.getElementById('stats-overlay');
            if (panel) panel.classList.toggle('hidden');
        };

        // Use window.addEventListener for keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.key === 'F2') {
                e.preventDefault();
                window.togglePhysicsPanel?.();
            }
            if (e.key === 'F3') {
                e.preventDefault();
                window.toggleStatsOverlay?.();
            }
            if (e.key === 'F4') {
                e.preventDefault();
                // Toggle physics debug visualization
                window.togglePhysicsDebug?.();
            }
        });
    </script>

    <!-- Audio Manager (non-module, sets window.audioManager) -->
    <script src="/static/js/audioManager.js"></script>

    <!-- Main game initialization (Vite entry point) -->
    <script type="module" src="/src/host/main.js"></script>

    <!-- Pass server data to client -->
    <script>
        const serverConfig = {
            localIp: "{{ local_ip }}",
            port: "{{ port }}"
        };
    </script>
</body>
</html>
