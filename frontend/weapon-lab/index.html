<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💥 Weapon Test Lab — Joystick Jammers (debug)</title>
  <style>
    :root { --cyan:#4cc9f0; --green:#00ff88; --pink:#f72585; --red:#ff5a5a; --bg:#0d1429; --panel:rgba(22,33,62,.86); --border:rgba(76,201,240,.25); }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; overflow:hidden; background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; color:#fff; }
    #c { position:fixed; inset:0; display:block; }
    #panel { position:fixed; top:14px; left:14px; width:330px; max-height:calc(100vh - 28px); overflow:auto;
      background:var(--panel); backdrop-filter:blur(10px); border:1px solid var(--border); border-radius:14px;
      padding:14px 16px; font-size:13px; z-index:10; box-shadow:0 0 30px rgba(76,201,240,.15); }
    h1 { font-size:15px; margin:0 0 2px; letter-spacing:-.01em; }
    .sub { color:#8d99ae; font-size:11px; margin:0 0 12px; }
    label { display:block; text-transform:uppercase; letter-spacing:.08em; font-size:10px; color:var(--cyan);
      font-weight:700; margin:12px 0 5px; }
    select { width:100%; background:#0d1429; color:#fff; border:1px solid var(--border); border-radius:8px; padding:7px; font-size:13px; }
    .row { display:flex; gap:8px; align-items:center; margin:10px 0; flex-wrap:wrap; }
    .row button { flex:1 1 120px; background:linear-gradient(135deg,var(--green),var(--cyan)); color:#0d1429;
      border:0; border-radius:999px; padding:9px; font-weight:700; cursor:pointer; font-size:12px; }
    .row button.alt { background:linear-gradient(135deg,var(--cyan),#6c8cff); }
    form.weapon-tuning { margin-top:10px; border-top:1px solid var(--border); padding-top:10px; }
    .group { border-top:1px dashed rgba(255,255,255,.08); padding-top:6px; margin-top:10px; }
    .group h2 { font-size:11px; letter-spacing:.08em; text-transform:uppercase; margin:0 0 6px; color:var(--cyan); }
    .inputs { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .field { display:flex; flex-direction:column; gap:3px; }
    .field label { margin:0; font-size:9px; }
    .field input {
      width:100%;
      background:#0d1429;
      color:#fff;
      border:1px solid var(--border);
      border-radius:8px;
      padding:6px;
      font-size:12px;
      font-family:monospace;
    }
    .badges { display:flex; flex-direction:column; gap:5px; margin-top:8px; }
    .badge { display:flex; align-items:center; gap:8px; font-size:11px; line-height:1.3; padding:6px 8px; border-radius:8px;
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); }
    .badge .dot { width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
    .badge.pass .dot { background:var(--green); box-shadow:0 0 8px var(--green); }
    .badge.fail .dot { background:var(--red); box-shadow:0 0 8px var(--red); }
    .badge .detail { color:#8d99ae; }
    #summary { margin-top:10px; font-size:12px; font-weight:700; }
    #summary.ok { color:var(--green); } #summary.bad { color:var(--red); }
    #diag { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); font-size:10.5px;
      color:#cdd6e6; line-height:1.5; font-family:'SF Mono',Monaco,monospace; white-space:pre-wrap; word-break:break-word;
      max-height:230px; overflow:auto; }
    #hint { position:fixed; bottom:12px; right:14px; color:#8d99ae; font-size:11px; z-index:10; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="panel">
    <h1>💥 Weapon Test Lab</h1>
    <p class="sub">debug · drives the real WeaponSystem · <span id="count"></span> presets</p>

    <label for="scenario">Scenario</label>
    <select id="scenario"></select>

    <div class="row">
      <button id="run">Run checks</button>
      <button id="runAll" class="alt">Run all</button>
    </div>
    <div class="row">
      <button id="reset" class="alt">Reset</button>
      <button id="stepFrame" class="alt">+1 frame</button>
      <button id="stepSecond" class="alt">+1 sec</button>
      <button id="playPause" class="alt">Play/Pause</button>
    </div>
    <div class="row">
      <button id="shot" class="alt">Screenshot</button>
      <button id="export" class="alt">Export JSON</button>
      <button id="import" class="alt">Import JSON</button>
    </div>
    <form id="weaponTuning" class="weapon-tuning">
      <div class="group">
        <h2>Projectile / Tracking</h2>
        <div class="inputs">
          <div class="field"><label for="missileSpeed">Missile speed</label><input id="missileSpeed" type="number" step="1" /></div>
          <div class="field"><label for="missileLifetime">Missile lifetime</label><input id="missileLifetime" type="number" step="1" /></div>
          <div class="field"><label for="missileTurnRate">Missile turnRate</label><input id="missileTurnRate" type="number" step="0.1" /></div>
          <div class="field"><label for="missileLockAngle">Missile lockAngle</label><input id="missileLockAngle" type="number" step="0.1" /></div>
        </div>
      </div>
      <div class="group">
        <h2>Deployables / Buffs</h2>
        <div class="inputs">
          <div class="field"><label for="mineArmDelay">Mine arm delay</label><input id="mineArmDelay" type="number" step="0.1" /></div>
          <div class="field"><label for="mineTriggerRadius">Mine trigger radius</label><input id="mineTriggerRadius" type="number" step="0.1" /></div>
          <div class="field"><label for="mineLifetime">Mine lifetime</label><input id="mineLifetime" type="number" step="1" /></div>
          <div class="field"><label for="boostDuration">Boost duration</label><input id="boostDuration" type="number" step="0.1" /></div>
          <div class="field"><label for="boostSpeed">Boost speed</label><input id="boostSpeed" type="number" step="0.1" /></div>
          <div class="field"><label for="boostRam">Boost ram dmg</label><input id="boostRam" type="number" step="1" /></div>
        </div>
      </div>
      <div class="group">
        <h2>Hitscan / AOE / Zones</h2>
        <div class="inputs">
          <div class="field"><label for="sniperRange">Sniper range</label><input id="sniperRange" type="number" step="1" /></div>
          <div class="field"><label for="sniperAimTolerance">Sniper aim tol</label><input id="sniperAimTolerance" type="number" step="0.01" /></div>
          <div class="field"><label for="empRadius">EMP radius</label><input id="empRadius" type="number" step="1" /></div>
          <div class="field"><label for="empStun">EMP stun</label><input id="empStun" type="number" step="0.1" /></div>
          <div class="field"><label for="oilRadius">Oil radius</label><input id="oilRadius" type="number" step="0.1" /></div>
          <div class="field"><label for="oilFriction">Oil friction</label><input id="oilFriction" type="number" step="0.01" /></div>
          <div class="field"><label for="oilLifetime">Oil lifetime</label><input id="oilLifetime" type="number" step="1" /></div>
        </div>
      </div>
      <div class="group">
        <h2>Continuous / Damage</h2>
        <div class="inputs">
          <div class="field"><label for="flameCone">Flame cone</label><input id="flameCone" type="number" step="1" /></div>
          <div class="field"><label for="flameRange">Flame range</label><input id="flameRange" type="number" step="0.1" /></div>
          <div class="field"><label for="flameTickRate">Flame tick rate</label><input id="flameTickRate" type="number" step="0.01" /></div>
          <div class="field"><label for="flameDmg">Flame damage</label><input id="flameDmg" type="number" step="1" /></div>
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="applyTuning" type="submit" class="alt">Apply tuning</button>
      </div>
    </form>
    <input id="importFile" type="file" accept="application/json" hidden />

    <div id="summary"></div>
    <div class="badges" id="badges"></div>
    <div id="diag"></div>
  </div>
  <div id="hint">Weapon Lab · production code paths · deterministic seed</div>

  <script type="module" src="./lab.js"></script>
</body>
</html>
